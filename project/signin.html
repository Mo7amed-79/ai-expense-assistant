<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-page="signin">
  <header class="topbar">
    <div class="brand">AI Assistant</div>
    <nav class="nav">
      <a href="signin.html" class="navlink active">Sign in</a>
      <a href="signup.html" class="navlink">Sign up</a>
    </nav>
  </header>

  <main class="container">
    <h1>Sign in</h1>

    <div class="card">
      <label class="label">Email</label>
      <input id="email" class="input" type="email" placeholder="you@example.com" />

      <label class="label">Password</label>
      <input id="password" class="input" type="password" placeholder="••••••••" />

      <button id="loginBtn" class="btn">Sign in</button>
      <div id="authMsg" class="muted" style="margin-top:10px;"></div>

      <div class="muted" style="margin-top:14px;">
        No account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
<script src="js/inbox.js"></script>
  <!-- Optional: if your auth.js doesn't auto-wire, you can wire in auth.js or common.js -->
</body>
</html>
